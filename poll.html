<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poll</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f5; }
    .card { background: #fff; border-radius: 16px; padding: 2rem; max-width: 460px; width: 90%; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h2 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 1.5rem; line-height: 1.4; }
    .btn-row { display: flex; gap: 12px; margin-bottom: 1rem; }
    .vote-btn { flex: 1; padding: 14px; font-size: 16px; font-weight: 500; border-radius: 12px; border: 1px solid #ddd; background: #fff; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
    .vote-btn:hover { background: #f0f0f0; }
    .vote-btn.selected-yes { background: #eafaf1; border-color: #27ae60; color: #1e8449; }
    .vote-btn.selected-no  { background: #fdecea; border-color: #e74c3c; color: #c0392b; }
    .results-btn { width: 100%; padding: 12px; font-size: 15px; border-radius: 12px; border: 1px solid #ddd; background: #fff; color: #555; cursor: pointer; display: none; }
    .results-btn:hover { background: #f0f0f0; }
    .results { display: none; margin-top: 1.5rem; }
    .bar-row { margin-bottom: 12px; }
    .bar-label { display: flex; justify-content: space-between; font-size: 14px; color: #555; margin-bottom: 6px; }
    .bar-track { height: 10px; border-radius: 99px; background: #eee; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; width: 0%; transition: width 0.5s ease; }
    .bar-yes { background: #27ae60; }
    .bar-no  { background: #e74c3c; }
    .total { font-size: 13px; color: #999; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Should I include that I am an Illustrator / Graphic Designer?</h2>
    <div class="btn-row">
      <button class="vote-btn" id="yes-btn" onclick="vote('yes')">Yes</button>
      <button class="vote-btn" id="no-btn" onclick="vote('no')">No</button>
    </div>
    <button class="results-btn" id="results-btn" onclick="showResults()">View results</button>
    <div class="results" id="results">
      <div class="bar-row">
        <div class="bar-label"><span>Yes</span><span id="yes-pct">0%</span></div>
        <div class="bar-track"><div class="bar-fill bar-yes" id="yes-bar"></div></div>
      </div>
      <div class="bar-row">
        <div class="bar-label"><span>No</span><span id="no-pct">0%</span></div>
        <div class="bar-track"><div class="bar-fill bar-no" id="no-bar"></div></div>
      </div>
      <div class="total" id="total-label"></div>
    </div>
  </div>

  <script>
    const votes = { yes: 0, no: 0 };
    let voted = false;

    function vote(choice) {
      if (voted) return;
      voted = true;
      votes[choice]++;
      document.getElementById('yes-btn').classList.remove('selected-yes', 'selected-no');
      document.getElementById('no-btn').classList.remove('selected-yes', 'selected-no');
      document.getElementById(choice + '-btn').classList.add(choice === 'yes' ? 'selected-yes' : 'selected-no');
      document.getElementById('results-btn').style.display = 'block';
    }

    function showResults() {
      const total = votes.yes + votes.no;
      const yesPct = total ? Math.round((votes.yes / total) * 100) : 0;
      const noPct = 100 - yesPct;
      document.getElementById('yes-pct').textContent = yesPct + '%';
      document.getElementById('no-pct').textContent = noPct + '%';
      document.getElementById('yes-bar').style.width = yesPct + '%';
      document.getElementById('no-bar').style.width = noPct + '%';
      document.getElementById('total-label').textContent = total + ' vote' + (total !== 1 ? 's' : '') + ' total';
      document.getElementById('results').style.display = 'block';
      document.getElementById('results-btn').style.display = 'none';
    }
  </script>
</body>
</html>
