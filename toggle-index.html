<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christian Stacy | Graphic Design & Illustration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Chewy&display=swap" rel="stylesheet">
<link rel="icon" href="https://cursivart.github.io/Logo-Favi/Dragon-Logo_simplified.svg" type="image/svg+xml">

<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── PAGE LOCK ── */
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Cormorant Garamond', serif;
}

.page-wrap {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ══════════════════════════════════════════════
   BACKGROUND LAYERS — day & night crossfade
══════════════════════════════════════════════ */
.bg-day, .bg-night {
  position: absolute;
  inset: 0;
  transition: opacity 1.2s ease;
  pointer-events: none;
  z-index: 0;
}
.bg-day   { background: linear-gradient(180deg, #b8d4f0 0%, #d6e8f7 40%, #eef4fb 100%); opacity: 1; }
.bg-night { background: linear-gradient(180deg, #040812 0%, #080c20 50%, #0a0e28 100%); opacity: 0; }

body.night .bg-day   { opacity: 0; }
body.night .bg-night { opacity: 1; }

/* ══════════════════════════════════════════════
   HEADER
══════════════════════════════════════════════ */
header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  height: clamp(80px, 14vh, 130px);
  position: relative;
  z-index: 10;
}

/* Logo container — sized so header has real height */
.logo-wrap {
  position: relative;
  width: clamp(140px, 18vw, 208px);
  height: clamp(60px, 10vh, 114px);
}

/* ── Logo fill transition ── */
.logo-main { transition: opacity 0.3s ease; cursor: default; opacity: 0.78; }
.logo-main:hover { opacity: 1; }
.logo-path { fill: #2c4a6e; transition: fill 1.2s ease; }
body.night .logo-path { fill: #f0eee8; }

/* ══════════════════════════════════════════════
   STAGE LAYERS
══════════════════════════════════════════════ */
.stage-wrap {
  flex: 1;
  min-height: 0;
  position: relative;
  overflow: hidden;
}

.cloud-stage, .constellation-stage {
  position: absolute;
  inset: 0;
  transition: opacity 1.2s ease;
}

.cloud-stage         { opacity: 1; pointer-events: all; z-index: 2; }
.constellation-stage { opacity: 0; pointer-events: none; z-index: 3; }

body.night .cloud-stage         { opacity: 0; pointer-events: none; }
body.night .constellation-stage { opacity: 1; pointer-events: all; }

/* ══════════════════════════════════════════════
   BOTTOM NAV + TOGGLE
══════════════════════════════════════════════ */
.bottom-nav {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: clamp(24px, 4vw, 56px);
  padding: clamp(10px,1.8vh,20px) 0 clamp(12px,2vh,22px);
  position: relative;
  z-index: 10;
}

/* Nav pills — single class, colors crossfade on toggle */
.nav-pill-day {
  font-family: 'Chewy', cursive;
  font-size: clamp(0.75rem, 1.1vw, 0.95rem);
  letter-spacing: 0.18em;
  color: #4a6fa5;
  text-decoration: none;
  padding: 5px 16px;
  border: 2px solid #4a6fa5;
  border-radius: 999px;
  transition: color 1.2s ease, border-color 1.2s ease, background 0.25s ease;
}
.nav-pill-day:hover { background: rgba(74,111,165,0.08); }
body.night .nav-pill-day {
  color: rgba(240,238,232,0.75);
  border-color: rgba(180,210,255,0.3);
}
body.night .nav-pill-day:hover {
  color: #f0eee8;
  border-color: rgba(180,210,255,0.6);
  background: rgba(180,210,255,0.07);
}

/* ── TOGGLE SWITCH ── */
.mode-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.toggle-icon {
  font-size: 13px;
  transition: opacity 0.5s;
  line-height: 1;
}
.toggle-icon.sun  { opacity: 1; }
.toggle-icon.moon { opacity: 0.4; }
body.night .toggle-icon.sun  { opacity: 0.4; }
body.night .toggle-icon.moon { opacity: 1; }

.toggle-track {
  width: 42px; height: 24px;
  border-radius: 999px;
  position: relative;
  transition: background 1.2s ease, border-color 0.4s ease;
  background: rgba(74,111,165,0.25);
  border: 1.5px solid rgba(74,111,165,0.5);
  flex-shrink: 0;
}
body.night .toggle-track {
  background: rgba(80,100,180,0.35);
  border-color: rgba(180,210,255,0.35);
}
.toggle-thumb {
  position: absolute;
  top: 2px; left: 2px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #4a6fa5;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), background 1.2s ease;
}
body.night .toggle-thumb {
  transform: translateX(18px);
  background: rgba(180,210,255,0.9);
}

/* ══════════════════════════════════════════════
   MIST (day only)
══════════════════════════════════════════════ */
.mist {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(to top, rgba(220,235,255,0.55), transparent);
  pointer-events: none;
  z-index: 4;
  transition: opacity 1.2s ease;
  opacity: 1;
}
body.night .mist { opacity: 0; }

/* ══════════════════════════════════════════════
   CLOUD (DAY) STYLES
══════════════════════════════════════════════ */
.cloud-wrap {
  position: absolute;
  animation: driftLeft linear infinite;
  animation-play-state: running;
  pointer-events: none;
}
.cloud-hit {
  position: absolute;
  left: 10%; top: 17.5%;
  width: 80%; height: 65%;
  border-radius: 50%;
  pointer-events: all;
  cursor: pointer;
  z-index: 6;
}
.cloud-wrap:has(.cloud-hit:hover) { animation-play-state: paused; }
.cloud-wrap:has(.cloud-hit:hover) .cloud-svg { filter: drop-shadow(0 12px 36px rgba(80,120,200,0.38)); }
.cloud-wrap:has(.cloud-hit:hover) .cloud-image-wrap { opacity: 0.6; }
.cloud-wrap:has(.cloud-hit:hover) .cloud-veil { opacity: 0; }
@keyframes driftLeft {
  from { transform: translateX(110vw); }
  to   { transform: translateX(-110vw); }
}
.cloud-svg {
  display: block;
  filter: drop-shadow(0 8px 24px rgba(100,140,200,0.22));
  transition: filter 0.4s;
}
.cloud-image-wrap {
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity 0.55s ease;
}
.cloud-image-wrap img { width: 100%; height: 100%; object-fit: cover; }
.cloud-veil {
  pointer-events: none;
  opacity: 1;
  transition: opacity 0.55s ease;
}

/* ══════════════════════════════════════════════
   CONSTELLATION (NIGHT) STYLES
══════════════════════════════════════════════ */
.bg-stars { position: absolute; inset: 0; pointer-events: none; }
.dot {
  position: absolute;
  background: rgba(255,255,255,0.6);
  border-radius: 50%;
  animation: flicker var(--d) ease-in-out infinite var(--delay);
}
@keyframes flicker {
  0%,100%{ opacity:0.12; transform:scale(0.7); }
  50%{ opacity:0.9; transform:scale(1.15); }
}
#cv { position: absolute; inset: 0; pointer-events: none; }

.star-node {
  position: absolute;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.star-node.has-project { pointer-events: all; cursor: pointer; }
.star-dot {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 5px; height: 5px;
  background: #e8eeff; border-radius: 50%;
}
.star-glow-dot {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 20px; height: 20px; border-radius: 50%;
  background: radial-gradient(circle, rgba(180,210,255,0.38) 0%, transparent 70%);
}
.star-svg-wrap {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0);
  width: 56px; height: 56px;
  opacity: 0;
  filter: drop-shadow(0 0 10px rgba(200,225,255,0.95)) drop-shadow(0 0 28px rgba(160,190,255,0.6));
  pointer-events: none;
}
.star-svg-wrap svg { width: 100%; height: 100%; }
.star-label {
  position: absolute; left: 50%; transform: translateX(-50%);
  top: calc(50% + 42px);
  font-size: 10px; color: rgba(180,210,255,0);
  white-space: nowrap; pointer-events: none; letter-spacing: 0.05em;
  font-family: 'Cinzel', serif;
}

/* ══════════════════════════════════════════════
   LIGHTBOX — liquid glass
══════════════════════════════════════════════ */
.lightbox-overlay {
  position: fixed; inset: 0;
  background: rgba(4,6,18,0.35);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
}
.lightbox-overlay.open { opacity: 1; pointer-events: auto; }

.lightbox-box {
  position: fixed;
  top: 50px; left: 50px; right: 50px; bottom: 50px;
  background: linear-gradient(135deg,
    rgba(255,255,255,0.10) 0%,
    rgba(180,210,255,0.07) 40%,
    rgba(120,160,255,0.05) 100%
  );
  backdrop-filter: blur(28px) saturate(1.6) brightness(1.08);
  -webkit-backdrop-filter: blur(28px) saturate(1.6) brightness(1.08);
  border: 1px solid rgba(255,255,255,0.18);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.22),
    inset 0 -1px 0 rgba(255,255,255,0.06),
    inset 1px 0 0 rgba(255,255,255,0.10),
    0 8px 32px rgba(0,0,0,0.45),
    0 32px 80px rgba(0,0,0,0.3),
    0 0 0 0.5px rgba(180,210,255,0.12);
  border-radius: 36px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 28px 28px 0;
  transform: scale(0.96);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  overflow: hidden;
}
.lightbox-overlay.open .lightbox-box { transform: scale(1); }

.lightbox-box img {
  flex: 1; min-height: 0; width: 100%;
  object-fit: contain; border-radius: 18px; display: block;
}
.lightbox-caption {
  flex-shrink: 0; width: 100%;
  padding: 16px 0 20px; text-align: center;
}
.lightbox-caption h3 {
  display: inline-block;
  font-family: 'Cinzel', serif;
  font-size: clamp(1rem,1.8vw,1.4rem);
  font-weight: 600; color: rgba(255,255,255,0.92);
  letter-spacing: 0.08em; margin-bottom: 8px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.14);
  padding: 5px 22px; border-radius: 999px;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.lightbox-caption p {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(0.9rem,1.2vw,1.05rem);
  font-weight: 300; color: rgba(200,225,255,0.65);
  line-height: 1.7; font-style: italic;
  max-width: 580px; margin: 0 auto;
}
.lightbox-close {
  position: fixed; top: 18px; right: 18px;
  width: 44px; height: 44px;
  background: rgba(255,255,255,0.10);
  border: 1px solid rgba(255,255,255,0.18);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 4px 16px rgba(0,0,0,0.3);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-radius: 50%; cursor: pointer; z-index: 101;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transform: scale(0.8);
  transition: opacity 0.3s ease 0.1s, transform 0.3s ease 0.1s;
}
.lightbox-overlay.open .lightbox-close { opacity: 1; pointer-events: auto; transform: scale(1); }
.lightbox-close:hover { background: rgba(255,255,255,0.16); transform: scale(1.08); }
.lightbox-close svg { width: 14px; height: 14px; stroke: rgba(255,255,255,0.85); stroke-width: 2; stroke-linecap: round; }

/* ── MOBILE ── */
@media (max-width: 900px) {
  html, body { overflow: auto; }
  .page-wrap { position: relative; min-height: 100vh; height: auto; overflow: auto; }
  .stage-wrap { min-height: 80vh; flex: none; }
  .bottom-nav { gap: 16px; flex-wrap: wrap; padding: 12px 16px 16px; }
  .lightbox-box { top:5vh; left:5vw; right:5vw; bottom:5vh; border-radius:24px; padding:16px 16px 0; }
}
</style>
</head>

/* ═══════════════════════════════════════════════════════════
   LIGHTBOX
═══════════════════════════════════════════════════════════ */
const overlay  = document.getElementById('lightbox');
const lbImg    = document.getElementById('lightbox-img');
const closeBtn = document.getElementById('lightbox-close');

function openLightbox(src, title, description, fullSrc) {
  document.getElementById('lightbox-title').textContent = title || '';
  document.getElementById('lightbox-desc').textContent  = description || '';
  lbImg.src = src; lbImg.alt = title || ''; lbImg.style.opacity = '1';
  overlay.classList.add('open');
  if (fullSrc && fullSrc !== src) {
    const loader = new Image();
    loader.onload = () => {
      if (!overlay.classList.contains('open')) return;
      lbImg.style.transition = 'opacity 0.35s ease';
      lbImg.style.opacity = '0';
      setTimeout(() => { lbImg.src = fullSrc; lbImg.style.opacity = '1'; }, 350);
    };
    loader.src = fullSrc;
  }
}
function closeLightbox() {
  overlay.classList.remove('open');
  lbImg.style.transition = ''; lbImg.style.opacity = '1';
  setTimeout(() => { lbImg.src = ''; }, 400);
}
closeBtn.addEventListener('click', closeLightbox);
overlay.addEventListener('click', e => { if (e.target === overlay) closeLightbox(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

/* ═══════════════════════════════════════════════════════════
   MODE TOGGLE
═══════════════════════════════════════════════════════════ */
const toggle = document.getElementById('mode-toggle');
const NS = 'http://www.w3.org/2000/svg';
const cloudStage = document.getElementById('cloud-stage');
let isNight = false;

function getCloudWraps() {
  return Array.from(cloudStage.querySelectorAll('.cloud-wrap'));
}

function sweepCloudsOut() {
  const wraps  = getCloudWraps();
  const stageW = cloudStage.offsetWidth;

  wraps.forEach(wrap => {
    const rect    = wrap.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const goRight = centerX > stageW / 2;
    const exitVal = goRight ? '200vw' : '-200vw';
    const duration = 2.2 + Math.random() * 1.8;
    const delay    = Math.random() * 0.4;

    wrap.style.transition = `left ${duration}s cubic-bezier(0.4, 0, 0.6, 1) ${delay}s`;
    wrap.style.left = exitVal;
  });
}

function slideInClouds() {
  const wraps = getCloudWraps();

  // Phase 1: snap ALL clouds off-screen simultaneously, no transition
  wraps.forEach(wrap => {
    const fromLeft = wrap.classList.contains('cloud-from-left');
    wrap.style.transition = 'none';
    wrap.style.left = fromLeft ? '-200vw' : '200vw';
  });

  // Single reflow to commit all snaps before we start animating
  void cloudStage.offsetHeight;

  // Phase 2: slide all in, staggered by index
  wraps.forEach((wrap, i) => {
    const duration = 1.8 + Math.random() * 0.4;
    const delay    = (i * 0.12).toFixed(2);
    wrap.style.transition = `left ${duration}s cubic-bezier(0.22, 1, 0.36, 1) ${delay}s`;
    wrap.style.left = '0px';
  });
}

// Slide in on first page load
window.addEventListener('load', () => setTimeout(slideInClouds, 80));

toggle.addEventListener('click', () => {
  isNight = !isNight;
  if (isNight) {
    sweepCloudsOut();
    setTimeout(() => document.body.classList.add('night'), 300);
  } else {
    document.body.classList.remove('night');
    setTimeout(slideInClouds, 500);
  }
});

/* ═══════════════════════════════════════════════════════════
   DAY MODE — CLOUDS
═══════════════════════════════════════════════════════════ */

function svgEl(tag, attrs) {
  const el = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  return el;
}

clouds.forEach((c, i) => {
  const shape = cloudShapes[c.shape];
  const displayH = Math.round(c.displayW * (shape.vbH / shape.vbW));
  const vb = '0 0 ' + shape.vbW + ' ' + shape.vbH;
  const clipId = 'clip_' + i;
  const imgClipId = 'imgclip_' + i;

  // Outer exit wrapper — this is what we translate on toggle
  const wrap = document.createElement('div');
  wrap.className = 'cloud-wrap ' + (i%2===0 ? 'cloud-from-left' : 'cloud-from-right');
  wrap.style.top = c.top;
  wrap.style.left = '0px';
  wrap.style.width = c.displayW + 'px';
  wrap.style.height = displayH + 'px';
  wrap.style.animationDuration = c.duration + 's';
  wrap.style.animationDelay = c.delay + 's';
  wrap.dataset.origW = c.displayW;
  wrap.dataset.origH = displayH;
  wrap.dataset.topFrac = parseFloat(c.top) / 100;

  const svgBase = svgEl('svg', { class:'cloud-svg', width:c.displayW, height:displayH, viewBox:vb });
  svgBase.style.cssText = 'position:absolute;top:0;left:0;z-index:1;overflow:visible;';
  const defs = svgEl('defs',{}); const clip = svgEl('clipPath',{id:clipId});
  clip.appendChild(svgEl('path',{d:shape.d})); defs.appendChild(clip);
  svgBase.appendChild(defs);
  svgBase.appendChild(svgEl('path',{d:shape.d,fill:'white'}));
  wrap.appendChild(svgBase);

  const imgWrap = document.createElement('div');
  imgWrap.className = 'cloud-image-wrap';
  imgWrap.style.cssText = 'position:absolute;inset:0;z-index:2;';
  const svgImg = svgEl('svg',{width:c.displayW,height:displayH,viewBox:vb});
  svgImg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;';
  const defs2 = svgEl('defs',{}); const clip2 = svgEl('clipPath',{id:imgClipId});
  clip2.appendChild(svgEl('path',{d:shape.d})); defs2.appendChild(clip2);
  svgImg.appendChild(defs2);
  svgImg.appendChild(svgEl('image',{href:c.image,x:0,y:0,width:shape.vbW,height:shape.vbH,preserveAspectRatio:'xMidYMid slice','clip-path':'url(#'+imgClipId+')'}));
  imgWrap.appendChild(svgImg); wrap.appendChild(imgWrap);

  const svgVeil = svgEl('svg',{class:'cloud-veil',width:c.displayW,height:displayH,viewBox:vb});
  svgVeil.style.cssText = 'position:absolute;top:0;left:0;z-index:3;';
  svgVeil.appendChild(svgEl('path',{d:shape.d,fill:'white'}));
  wrap.appendChild(svgVeil);

  const hit = document.createElement('div');
  hit.className = 'cloud-hit';
  hit.addEventListener('click', () => openLightbox(c.image, c.label, c.description, c.fullImage));
  wrap.appendChild(hit);

  cloudStage.appendChild(wrap);
});

// Desktop fit
(function() {
  if (window.matchMedia('(max-width:900px)').matches) return;
  const wraps = Array.from(cloudStage.querySelectorAll('.cloud-wrap'));
  function fit() {
    const stageH = cloudStage.offsetHeight;
    if (!stageH) return;
    let minScale = Infinity;
    wraps.forEach(w => {
      const origH = parseFloat(w.dataset.origH);
      const topFrac = parseFloat(w.dataset.topFrac);
      const available = stageH - 24 - (topFrac * stageH) - 24;
      if (available > 0) { const s = available / origH; if (s < minScale) minScale = s; }
    });
    if (!isFinite(minScale) || minScale > 1) minScale = 1;
    wraps.forEach(w => {
      const nW = Math.round(parseFloat(w.dataset.origW) * minScale);
      const nH = Math.round(parseFloat(w.dataset.origH) * minScale);
      w.style.width = nW+'px'; w.style.height = nH+'px';
      w.querySelectorAll('svg').forEach(s => { s.setAttribute('width',nW); s.setAttribute('height',nH); });
    });
  }
  if (document.readyState==='complete') requestAnimationFrame(()=>requestAnimationFrame(fit));
  else window.addEventListener('load', ()=>requestAnimationFrame(()=>requestAnimationFrame(fit)));
  let rt; window.addEventListener('resize',()=>{ clearTimeout(rt); rt=setTimeout(fit,100); });
}());

/* ═══════════════════════════════════════════════════════════
   NIGHT MODE — DRACO CONSTELLATION
═══════════════════════════════════════════════════════════ */
const starData = [
  { name:'Giausar',  px:0.30, py:0.82 },
  { name:'Thuban',   px:0.36, py:0.70 },
  { name:'Aldhibah', px:0.28, py:0.55 },
  { name:'Edasich',  px:0.22, py:0.44 },
  { name:'Altais',   px:0.30, py:0.32 },
  { name:'Tyl',      px:0.42, py:0.24 },
  { name:'Alsafi',   px:0.48, py:0.34 },
  { name:'Athebyne', px:0.55, py:0.20 },
  { name:'Grumium',  px:0.65, py:0.28 },
  { name:'Alrakis',  px:0.72, py:0.38 },
  { name:'Kuma',     px:0.78, py:0.30 },
  { name:'Eltanin',  px:0.84, py:0.42 },
  { name:'Rastaban', px:0.78, py:0.48 },
  { name:'Nodus I',  px:0.38, py:0.42 },
];
const connections = [[0,1],[1,2],[2,3],[3,13],[13,4],[4,5],[5,6],[6,7],[7,8],[8,9],[9,10],[10,11],[11,12],[12,9]];
const twinkles = starData.map(()=>({ f1:0.00035+Math.random()*0.00045, f2:0.00080+Math.random()*0.00060, o1:Math.random()*Math.PI*2, o2:Math.random()*Math.PI*2 }));
function getTwinkle(tw,ts){ const a=Math.sin(ts*tw.f1+tw.o1); const b=Math.sin(ts*tw.f2+tw.o2); return 0.62+0.28*((a+b)/2*0.5+0.5); }

const FULL_RADIUS=28, FADE_RADIUS=70, LERP_SPEED=0.045;
const conStage = document.getElementById('constellation-stage');
const bgStars  = document.getElementById('bg-stars');
const cv       = document.getElementById('cv');
const ctx      = cv.getContext('2d');
const nodesEl  = document.getElementById('star-nodes');

for (let i=0;i<120;i++){
  const d=document.createElement('div'); d.className='dot';
  const s=Math.random()*2+0.5;
  d.style.cssText=`width:${s}px;height:${s}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+1.5).toFixed(2)}s;--delay:-${(Math.random()*5).toFixed(2)}s`;
  bgStars.appendChild(d);
}

const projectMap={};
projects.forEach(p=>{ projectMap[p.starIndex]=p; });
const starPath='M142.37,284.74C119.54,183.71,101.04,165.2,0,142.37,101.03,119.54,119.54,101.04,142.37,0c22.83,101.05,41.33,119.55,142.37,142.37-101.04,22.83-119.54,41.34-142.37,142.37Z';
let stars=[];
let mouse={x:-999,y:-999};
let W=0,H=0;

starData.forEach((sd,i)=>{
  const proj=projectMap[i];
  const node=document.createElement('div');
  node.className='star-node'+(proj?' has-project':'');
  const labelText=proj?proj.title:sd.name;
  node.innerHTML=`<div class="star-glow-dot"></div><div class="star-dot"></div><div class="star-svg-wrap"><svg viewBox="0 0 284.74 284.74" xmlns="http://www.w3.org/2000/svg"><path fill="#fafaf7" d="${starPath}"/></svg></div><div class="star-label">${labelText}</div>`;
  if(proj){ node.addEventListener('click',()=>openLightbox(proj.image,proj.title,proj.description,proj.fullImage)); }
  nodesEl.appendChild(node);
  stars.push({ ...sd, node, dot:node.querySelector('.star-dot'), glowDot:node.querySelector('.star-glow-dot'), svgWrap:node.querySelector('.star-svg-wrap'), label:node.querySelector('.star-label'), x:0, y:0, proj, smoothedP:0 });
});

function resize(){
  W=conStage.offsetWidth; H=conStage.offsetHeight;
  cv.width=W; cv.height=H;
  stars.forEach(s=>{ s.x=s.px*W; s.y=s.py*H; s.node.style.left=s.x+'px'; s.node.style.top=s.y+'px'; });
}

conStage.addEventListener('mousemove',e=>{ const r=conStage.getBoundingClientRect(); mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top; });
conStage.addEventListener('mouseleave',()=>{ mouse.x=-999; mouse.y=-999; });

function proximity(star){
  const dx=mouse.x-star.x, dy=mouse.y-star.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>=FADE_RADIUS) return 0;
  if(dist<=FULL_RADIUS) return 1;
  const n=(dist-FULL_RADIUS)/(FADE_RADIUS-FULL_RADIUS);
  return 1-(n*n);
}

function frame(ts){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.strokeStyle='rgba(200,220,255,0.22)'; ctx.lineWidth=1; ctx.setLineDash([2,6]);
  connections.forEach(([a,b])=>{ ctx.beginPath(); ctx.moveTo(stars[a].x,stars[a].y); ctx.lineTo(stars[b].x,stars[b].y); ctx.stroke(); });
  ctx.restore();
  stars.forEach((star,i)=>{
    const tw=getTwinkle(twinkles[i],ts);
    const rawP=proximity(star);
    star.smoothedP+=(rawP-star.smoothedP)*LERP_SPEED;
    const p=star.smoothedP;
    const dotAlpha=tw*(1-p);
    star.dot.style.opacity=dotAlpha;
    star.glowDot.style.opacity=dotAlpha;
    star.svgWrap.style.transform=`translate(-50%,-50%) scale(${p})`;
    star.svgWrap.style.opacity=p;
    if(star.proj) star.label.style.color=`rgba(180,210,255,${Math.pow(p,1.5)*0.85})`;
  });
  requestAnimationFrame(frame);
}

window.addEventListener('resize',resize);
resize();
requestAnimationFrame(frame);
</script>
