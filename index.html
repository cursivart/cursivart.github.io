<script src="shared.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════
   Draco constellation — interactive star portfolio
═══════════════════════════════════════════════════════════ */

// ── STAR POSITIONS (fractional: 0-1 of stage width/height) ──
const starData = [
  { name: 'Giausar',  px: 0.30, py: 0.82 },
  { name: 'Thuban',   px: 0.36, py: 0.70 },
  { name: 'Aldhibah', px: 0.28, py: 0.55 },
  { name: 'Edasich',  px: 0.22, py: 0.44 },
  { name: 'Altais',   px: 0.30, py: 0.32 },
  { name: 'Tyl',      px: 0.42, py: 0.24 },
  { name: 'Alsafi',   px: 0.48, py: 0.34 },
  { name: 'Athebyne', px: 0.55, py: 0.20 },
  { name: 'Grumium',  px: 0.65, py: 0.28 },
  { name: 'Alrakis',  px: 0.72, py: 0.38 },
  { name: 'Kuma',     px: 0.78, py: 0.30 },
  { name: 'Eltanin',  px: 0.84, py: 0.42 },
  { name: 'Rastaban', px: 0.78, py: 0.48 },
  { name: 'Nodus I',  px: 0.38, py: 0.42 },
];

const connections = [
  [0,1],[1,2],[2,3],[3,13],[13,4],[4,5],[5,6],[6,7],[7,8],[8,9],[9,10],[10,11],[11,12],[12,9]
];

// ── TWINKLE OSCILLATORS ──
const twinkles = starData.map(() => ({
  f1: 0.00035 + Math.random() * 0.00045,
  f2: 0.00080 + Math.random() * 0.00060,
  o1: Math.random() * Math.PI * 2,
  o2: Math.random() * Math.PI * 2,
}));

function getTwinkle(tw, ts) {
  const a = Math.sin(ts * tw.f1 + tw.o1);
  const b = Math.sin(ts * tw.f2 + tw.o2);
  return 0.62 + 0.28 * ((a + b) / 2 * 0.5 + 0.5);
}

// ── PROXIMITY PARAMS ──
const FULL_RADIUS = 28;
const FADE_RADIUS = 70;

// ── DOM SETUP ──
const stageEl   = document.getElementById('stage');
const cv        = document.getElementById('cv');
const ctx       = cv.getContext('2d');
const bgEl      = document.getElementById('bg');
const nodesEl   = document.getElementById('star-nodes');

// background dots
for (let i = 0; i < 120; i++) {
  const d = document.createElement('div');
  d.className = 'dot';
  const s = Math.random() * 2 + 0.5;
  d.style.cssText = `width:${s}px;height:${s}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+1.5).toFixed(2)}s;--delay:-${(Math.random()*5).toFixed(2)}s`;
  bgEl.appendChild(d);
}

// build project lookup by starIndex
const projectMap = {};
projects.forEach(p => { projectMap[p.starIndex] = p; });

// build star nodes
const starPath = 'M142.37,284.74C119.54,183.71,101.04,165.2,0,142.37,101.03,119.54,119.54,101.04,142.37,0c22.83,101.05,41.33,119.55,142.37,142.37-101.04,22.83-119.54,41.34-142.37,142.37Z';
let stars = [];
let labelEls = [];

starData.forEach((sd, i) => {
  const proj = projectMap[i];
  const node = document.createElement('div');
  node.className = 'star-node' + (proj ? ' has-project' : '');
  node.innerHTML = `
    <div class="star-glow-dot"></div>
    <div class="star-dot"></div>
    <div class="star-svg-wrap">
      <svg viewBox="0 0 284.74 284.74" xmlns="http://www.w3.org/2000/svg">
        <path fill="#fafaf7" d="${starPath}"/>
      </svg>
    </div>
    <div class="star-label">${sd.name}</div>
  `;

  if (proj) {
    node.addEventListener('click', () => {
      openLightbox(proj.image, proj.title, proj.description, proj.fullImage);
    });
    node.style.cursor = 'pointer';
  }

  nodesEl.appendChild(node);
  stars.push({
    ...sd, node,
    dot:     node.querySelector('.star-dot'),
    glowDot: node.querySelector('.star-glow-dot'),
    svgWrap: node.querySelector('.star-svg-wrap'),
    label:   node.querySelector('.star-label'),
    x: 0, y: 0,
    proj,
  });
  labelEls.push(node.querySelector('.star-label'));
});

// ── LIGHTBOX ──
const overlay  = document.getElementById('lightbox');
const lbImg    = document.getElementById('lightbox-img');
const closeBtn = document.getElementById('lightbox-close');

function openLightbox(src, title, description, fullSrc) {
  document.getElementById('lightbox-title').textContent = title || '';
  document.getElementById('lightbox-desc').textContent  = description || '';
  lbImg.src = src;
  lbImg.alt = title || '';
  lbImg.style.opacity = '1';
  overlay.classList.add('open');

  if (fullSrc && fullSrc !== src) {
    const loader = new Image();
    loader.onload = () => {
      if (!overlay.classList.contains('open')) return;
      lbImg.style.transition = 'opacity 0.35s ease';
      lbImg.style.opacity = '0';
      setTimeout(() => { lbImg.src = fullSrc; lbImg.style.opacity = '1'; }, 350);
    };
    loader.src = fullSrc;
  }
}

function closeLightbox() {
  overlay.classList.remove('open');
  lbImg.style.transition = '';
  lbImg.style.opacity = '1';
  setTimeout(() => { lbImg.src = ''; }, 400);
}

closeBtn.addEventListener('click', closeLightbox);
overlay.addEventListener('click', e => { if (e.target === overlay) closeLightbox(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ── RESIZE ──
let W = 0, H = 0;
let mouse = { x: -999, y: -999 };

function resize() {
  W = stageEl.offsetWidth;
  H = stageEl.offsetHeight;
  cv.width = W;
  cv.height = H;
  stars.forEach(s => {
    s.x = s.px * W;
    s.y = s.py * H;
    s.node.style.left = s.x + 'px';
    s.node.style.top  = s.y + 'px';
  });
}

stageEl.addEventListener('mousemove', e => {
  const r = stageEl.getBoundingClientRect();
  mouse.x = e.clientX - r.left;
  mouse.y = e.clientY - r.top;
});
stageEl.addEventListener('mouseleave', () => { mouse.x = -999; mouse.y = -999; });

function proximity(star) {
  const dx = mouse.x - star.x;
  const dy = mouse.y - star.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist >= FADE_RADIUS) return 0;
  if (dist <= FULL_RADIUS) return 1;
  const n = (dist - FULL_RADIUS) / (FADE_RADIUS - FULL_RADIUS);
  return 1 - (n * n);
}

// ── RENDER LOOP ──
function frame(ts) {
  ctx.clearRect(0, 0, W, H);

  // dotted lines
  ctx.save();
  ctx.strokeStyle = 'rgba(200,220,255,0.22)';
  ctx.lineWidth = 1;
  ctx.setLineDash([2, 6]);
  connections.forEach(([a, b]) => {
    ctx.beginPath();
    ctx.moveTo(stars[a].x, stars[a].y);
    ctx.lineTo(stars[b].x, stars[b].y);
    ctx.stroke();
  });
  ctx.restore();

  stars.forEach((star, i) => {
    const tw = getTwinkle(twinkles[i], ts);
    const p  = proximity(star);

    const dotAlpha = tw * (1 - p);
    star.dot.style.opacity     = dotAlpha;
    star.glowDot.style.opacity = dotAlpha;

    star.svgWrap.style.transform = `translate(-50%, -50%) scale(${p})`;
    star.svgWrap.style.opacity   = p;

    // label — only show for stars with projects
    if (star.proj) {
      star.label.style.color = `rgba(180,210,255,${Math.pow(p, 1.5) * 0.85})`;
    }
  });

  requestAnimationFrame(frame);
}

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(frame);
</script>
