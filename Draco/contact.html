<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Christian Stacy</title>
<link rel="stylesheet" href="shared.css">

<style>
  .contact-stage {
    flex: 1; min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(12px, 3vh, 36px) clamp(20px, 5vw, 80px);
  }
  .contact-card-wrap {
    position: relative;
    width: 100%; max-width: 480px; height: 100%;
    min-height: 0; display: flex; flex-direction: column;
  }
  .contact-card-wrap::after {
    content: ''; position: absolute;
    left: 0; right: 0; bottom: 0; height: 56px;
    border-radius: 0 0 28px 28px;
    background: linear-gradient(to top, rgba(13,21,53,0.85) 0%, transparent 100%);
    pointer-events: none; z-index: 2;
  }
  .contact-card {
    width: 100%; height: 100%; min-height: 0;
    background: rgba(13, 21, 53, 0.8);
    border: 1px solid rgba(180,210,255,0.12);
    border-radius: 28px;
    padding: 40px 44px;
    display: flex; flex-direction: column; gap: 0;
    overflow-y: auto;
    backdrop-filter: blur(8px);
    scrollbar-width: thin;
    scrollbar-color: rgba(180,210,255,0.25) transparent;
  }
  .contact-card::-webkit-scrollbar { width: 6px; }
  .contact-card::-webkit-scrollbar-track { background: transparent; }
  .contact-card::-webkit-scrollbar-thumb { background: rgba(180,210,255,0.2); border-radius: 99px; }
  .contact-card h2 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.1rem, 2vw, 1.5rem);
    font-weight: 600; letter-spacing: 0.1em;
    color: var(--off-white); margin-bottom: 2rem;
    text-align: center;
  }
  .form-group {
    display: flex; flex-direction: column; gap: 6px;
    margin-bottom: 1.4rem;
  }
  .form-group:last-of-type { margin-bottom: 0; }
  .form-group label {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem; letter-spacing: 0.18em;
    color: rgba(180,210,255,0.6); text-transform: uppercase;
  }
  .form-group input,
  .form-group textarea {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem; font-weight: 300;
    color: var(--off-white);
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(180,210,255,0.25);
    border-radius: 0; padding: 6px 2px;
    outline: none; width: 100%;
    transition: border-color 0.25s ease;
    resize: none;
  }
  .form-group input::placeholder,
  .form-group textarea::placeholder {
    color: rgba(180,210,255,0.3); font-style: italic;
  }
  .form-group input:focus,
  .form-group textarea:focus {
    border-color: rgba(180,210,255,0.65);
  }
  .form-group textarea { min-height: 90px; line-height: 1.7; }
  .form-submit { margin-top: 2rem; display: flex; justify-content: center; }
  .submit-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem; letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--off-white);
    background: transparent;
    border: 1px solid rgba(180,210,255,0.35);
    border-radius: 999px; padding: 10px 36px;
    cursor: pointer;
    transition: background 0.3s, border-color 0.3s, transform 0.2s;
  }
  .submit-btn:hover {
    background: rgba(180,210,255,0.08);
    border-color: rgba(180,210,255,0.7);
    transform: scale(1.03);
  }
  .submit-btn:active { transform: scale(0.98); }
  @media (max-width: 900px) {
    .contact-card { padding: 30px 24px; border-radius: 22px; max-width: 100%; }
    .contact-card-wrap { max-width: 100%; }
  }
</style>
</head>

    </svg>
  </header>

  <main class="contact-stage">
    <div class="contact-card-wrap">
      <div class="contact-card">
        <h2>Get in Touch</h2>
        <form action="#" method="POST">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" autocomplete="off"/>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" autocomplete="off"/>
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="What's this about?" autocomplete="off"/>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Say hello..."></textarea>
          </div>
          <div class="form-submit">
            <button type="submit" class="submit-btn">Send</button>
          </div>
        </form>
      </div>
    </div>
  </main>
